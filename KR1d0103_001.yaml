body:
  text: 禮義答問建元元年七月有司奏郊殷之禮未詳郊在何年復以何祖配郊殷復在何時未郊得先殷與不明堂亦應與郊同年而祭不若應祭者復有配與無配不祀者堂殿職僚毀置云何八座丞郎通關博士議曹郎中裴昭明儀曹郎中孔逷議今年七月宜殷祠來年正月宜南郊明堂竝祭而無配殿中郎司馬憲議南郊無配饗祠如舊明堂無配宜應廢祀其殷祠同用今年十月若僕射王儉議案禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯僖二年祫明年春禘自此以後五年再殷禮緯稽命徵曰三年一祫五年一禘經記所論禘祫與時祭其言祥矣初不以先殷後郊為嫌至於郊配之重事由王迹是故杜林議云漢業特起不因緣堯宜以高帝配天魏高堂隆議以舜配天蔣濟云漢時奏議謂堯已禪舜不得為漢祖舜亦已禪禹不得為魏之祖今宜以武皇帝配天晉宋因循即為前式又案禮及孝經援神契竝云明堂有五室天子每月於其室聽朔布教祭五帝之神配以有功德之君大戴禮記曰明堂者所以明諸侯尊卑也許慎五經異義曰布政之宮故稱明堂明堂盛貌也周官匠人職稱明堂有五室鄭玄云周人明堂五室帝一室也切不聞有文王之寢鄭志趙商問云說者謂天子廟制如明堂是為明堂即文廟邪鄭答曰明堂王祭上帝以文王配耳猶如郊天以后稷配也袁孝尼云明堂法天之宮本祭天帝而以文王配其父於天位則可牽天帝而就人鬼則非義也泰元十三年孫耆之議稱郊以祀天故配之以后稷明堂以祀帝故配之以文王由斯言之郊為皇天之位明堂即上帝之廟徐邈謂配之為言必有神主郊為天壇則堂非文廟史記云趙綰王臧欲立明堂于時亦未有郊配漢又祀汾陰五畤即是五帝之祭亦未有郊配議者或謂南郊之日已旅上帝若又以無配而特祀明堂則一日再祭於義為黷案古者郊本不共日蔡邕獨斷曰祠南郊祀畢次北郊又次明堂高廟世祖廟謂之五供馬融云郊天之祀咸以夏正五氣用事有休有王各以其時兆於方郊四時合歲功作相成亦以此月總旅明堂是則南郊明堂各日之證也近代從省故與郊同日猶無煩黷之疑何者其為祭雖同所以致祭則異孔晁云言五帝佐天化育故有從祀之禮旅上帝是也至於四郊明堂則是本祀之所譬猶功臣從饗豈復廢其私廟且明堂有配之時南郊亦旅上帝此則不疑於共日今何故致嫌於同辰又禮記天子祭天地四方山川五祀歲徧尚書堯典咸秩無文詩云昭事上帝聿懷多福據此諸義則四方山川猶必享祀五帝大神義不可略魏文帝黃初二年正月郊天地明堂明帝太和元年正月以武皇帝配天文皇帝配上帝然則黃初中南郊明堂皆無配也又郊日及牲色異議紛然郊特牲云郊之用辛周之始郊也盧植云辛之為言自新絜也鄭玄云用辛日者為人當齋戒自新絜也漢魏以來或丁或己而用辛常多考之典據辛日為允郊特牲又云郊牲幣宜以正色繆襲據祭法云天地騂犢周家所尚魏以建丑為正牲宜尚白白虎通曰三王祭天一用夏正所以然者夏正得天之數也魏用異朔故牲色不同今大齊受命建寅創歷郊廟用牲一依晉宋謂宜以今年十月殷祀宗廟自此以後五年再殷來年正月上辛有事南郊宜以共日還祭明堂又用次辛饗祀北郊而並無配犧牲之色率由舊章詔可明堂可更詳有司又奏明堂尋禮無明文唯以孝經為正竊尋設祀之意蓋為文王有配則祭無配則止愚謂既配上帝則以帝為主今雖無配不應闕祀徐邈近代碩儒每所折衷其云郊為天壇則堂非文廟此實明據內外百司立議已定如更詢訪終無異說傍儒依史其管見既聖旨惟疑群下所未敢詳廢置之宜仰由天鑒詔依舊建元四年世祖即位其秋有司奏尋前代嗣位或於前郊年或別始晉宋以來未有畫一今年正月已郊未審明年應南北二郊祀明堂與不依舊通關八座丞郎博士議尚書令王儉議案秦為諸侯雜祀諸畤始皇并天下未有定祠漢高受命因雍四畤而起北畤始祠五帝未定郊丘文帝六年新垣平議初起湄陽五帝廟武帝初至雍郊見五畤後常三歲一郊祠雍元鼎四年始立后土祠於汾陰明年立太一祠於甘泉自是以後二歲一郊與雍更祠成帝初即位丞相匡衡於長安定南北郊哀平之際又復甘泉汾陰祠平帝元始五年王莽奏依匡衡議還復長安南北二郊光武建武二年定郊祀兆於洛陽魏晉因之率由漢典雖時或參差而類多閒歲至於嗣位之君參差不一宜有定制檢晉明帝大寧五迥叩其年九月崩成帝既位明年改元即郊𥳑文咸安二年南郊鉿七月崩孝武即位明年改元亦郊宋文帝元嘉三十年正月南郊其年二月崩孝武嗣位明年改元亦郊此則二代明例差可依放謂明年正月宜饗禮二郊虔祭明堂自茲厥後依舊閒歲尚書領國子祭酒張緒等十七人竝同儉議詔可永明元年當南郊而立春在郊後世祖欲遷郊尚書令王儉啟案禮記郊特牲云郊之祭也迎長日之至也大報天而主日也易說三王之郊一用夏正盧植云夏正在冬至後傳曰啟蟄而效此之謂也然則圜丘與郊各自行不相害也鄭玄云建寅之月晝夜分而日長矣王肅曰周以冬祭天於圜丘以正月又祭天以祈穀祭法稱燔柴太壇則圜丘也春秋傳云啟蟄而郊則祈穀也謹尋禮傳二文各有其義盧王兩說有若合符中朝省二丘以并二郊即今之郊禮義在報天事兼祈穀既不全以祈農何必俟夫啟蟄史官唯見傳義未達禮旨又尋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未南郊其月八日立春此復是近世明例不以先郊後春為嫌若或以元日合朔為礙者則晉成帝咸康元年正月一日加元服二日親祠南郊元服之重百僚備列雖在致齋行之不疑今齋內合朔此即前准若聖心過恭寧在嚴絜合朔之日散官備防非預齋之限者於止車門外別立幔省若日色有異則列於省前望實為允竊謂無煩遷日從之永明二年祠部郎中蔡履議郊與明堂本宜異日漢東京禮儀志南郊禮畢次北郊明堂高廟世祖廟謂之五供蔡邕所據亦然近世存省故郊堂共日來年郊祭宜有定准太學博士王祐議來年正月上辛宜祭南郊次辛有事明堂後辛饗祀北郊兼博士劉蔓議漢元鼎五年以辛巳行事自後郊日略無違異元封元年四月癸卯登封泰山坐明堂五年甲子以高祖配漢家郊祀非盡天子之縣故祠祭之月事有不同後漢永平以來明堂兆於國南而郊以上丁故供修三祀得并在初月雖郊有常日明堂猶無定辰何則郊丁社甲有說則從經禮無文難以意造是以必算良辰而不祭寅丑且禮之奠祭無同共者唯漢以朝日合於報天爾若依漢書五供便應先祭北郊然後明堂則是地先天食所未可也兼太常丞蔡仲熊議鄭志云正月上辛祀后稷於南郊還於明堂以文王配故宋氏創立明堂郊還即祭是用鄭志之說也蓋為志者失非玄意也玄之言曰未審周明堂以何月於月令則以季秋案玄注月令季秋大饗帝云大饗徧祭五帝又云大饗於明堂以文武配其時秋也去啟蟄遠矣又周禮大司樂凡大祭祀宿縣尋宿縣之旨以日出行事故也若日闇而後行事則無假預縣果日出行事何得方俟郊還東京禮儀志不記祭之時日而志云天郊夕牲之夜夜漏未盡八刻進熟明堂夕牲之夜夜漏未盡七刻進熟尋明堂之在郊前一刻而進獻奏樂方待郊還魏高堂隆表九日南郊十日北郊十一日明堂十二日宗廟案隆此言是審于時定制是則周禮至漢及魏皆不共日矣禮以辛郊書以丁祀辛丁皆合宜臨時詳擇太尉從事中郎顧憲之議春秋傳以正月上辛郊祀禮記亦云郊之用辛尚書獨云丁巳用牲于郊先儒以為先甲三日辛後甲三日丁可以接事天神之日後漢永平二年正月辛未宗祀光武皇帝於明堂辛既是常郊之日郊又在明堂之前無容不郊而堂則理應郊堂司徒西閤祭酒梁王議孝經鄭玄注云上帝亦天別名如鄭旨帝與天亦言不殊近代同辰良亦有據魏泰和元年正月丁未郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝此則已行之前准驍騎將軍江淹議郊旅上天堂祀五帝非為一日再黷之謂無俟釐革尚書陸澄議遺文餘事存乎舊書郊宗地近勢可共日不共者義在必異也元始五年正月六日辛未郊高皇帝以配天二十二日丁亥宗祀孝文於明堂以配上帝永平二年正月辛未宗祀五帝於明堂光武皇帝配章帝元和二年巡狩岱宗柴祭翌日祀五帝於明堂柴山祠地尚不共日郊堂宜異於例益明陳忠奏事云延光三年正月十三日南郊十四日北郊十五日明堂十六日宗廟十七日世祖廟仲遠五祀紹統五供與忠此奏皆為相符高堂隆表二郊及明堂宗廟各一日摯虞新禮議明堂南郊間三兆禋天饗帝共日之證也又上帝非天昔人言之已詳今明堂用日宜依古在北郊後漢唯南郊備大駕自北郊以下車駕十省其二今祠明堂不應大駕尚書令王儉議前漢各日後漢亦不共辰魏晉故事不辨同異宋立明堂唯據自郊徂宮之義未達祀天旅帝之旨何者郊壇旅天甫自詰朝還祀明堂便在日昃也祭有由而煩黷斯甚異日之議於理為宏春秋感精符云王者父天母地則北郊之祀應在明堂之先漢魏北郊亦皆親奉晉泰寧有詔未及遵建咸和八年甫得營繕太常顧和秉議親奉康皇之世已經遵用宋氏因循未遑釐革今宜親祠北郊明年正月上辛祠昊天次辛瘞后土後辛祀明堂御竝親奉車服之儀率遵漢制南郊大駕北郊明堂降為法駕袞冕之服諸祠咸用詔可宋昇明三年錫齊王大輅戎輅各一乘黃五輅無大輅戎輅左丞王逡之議大輅殷之祭車故不登周輅之名而明堂位云大輅殷輅也注云大輅木輅也月令中央土乘大輅注云殷輅也禮器大輅繁纓一就注云大輅殷之祭天車也周禮五路玉路金路象路革路木路則周之木輅殷之大輅也周革路建大白以即戎此則戎輅也意謂國之大事在祀與戎故錫以殷祭天之車與周之即戎之路祀則以殷戎必以周者明郊天義遠建前代之禮即戎事近故以命世之制明堂位云魯君孟春乘大路載十有二旒日月之章祀于帝郊天子以大輅以錫諸侯良有以也今木路即大路也太尉左長史王儉議宜用金輅九旒時乘黃無副借用五輅大朝臨軒權列三輅永明六年太常承何諲之議案周禮命數改三公八旒鄉六旒尚書令王儉議依漢三公服山龍九章卿華蟲七章從之
